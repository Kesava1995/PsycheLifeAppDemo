<style>
  body.profile-ext-page { padding: 0 !important; margin: 0; }
  body.profile-ext-page .app-chrome-topbar { display: none !important; }

  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --pe-accent:        #008896;
    --pe-accent-dark:   #006672;
    --pe-bg:            #fafafa;
    --pe-card:          #ffffff;
    --pe-text-primary:  #1a2224;
    --pe-text-secondary:#4a6668;
    --pe-text-hint:     #8aacae;
    --pe-border:        #e8f0f0;
    --pe-chip-bg:       #e8f0f0;
    --pe-inner-bg:      #fafafa;
    --pe-inner-border:  #e8f0f0;
    --pe-unavail-bg:    #f5f5f5;
    --pe-unavail-text:  #c8d8da;
  }

  html.pe-dark {
    --pe-bg:            #0d1315;
    --pe-card:          #1a2224;
    --pe-text-primary:  #ffffff;
    --pe-text-secondary:#8aacae;
    --pe-text-hint:     #4a6668;
    --pe-border:        #2a3234;
    --pe-chip-bg:       #2a3234;
    --pe-inner-bg:      #0d1315;
    --pe-inner-border:  #2a3234;
    --pe-unavail-bg:    #1a2224;
    --pe-unavail-text:  #4a6668;
  }

  body.profile-ext-page {
    font-family: 'Inter', 'Segoe UI', sans-serif;
    background: var(--pe-bg);
    color: var(--pe-text-primary);
    min-height: 100vh;
  }

  .pe-topbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--pe-card);
    height: 56px;
    border-bottom: 1px solid var(--pe-border);
  }
  .pe-topbar .inner {
    max-width: 1200px; margin: 0 auto; padding: 0 24px;
    height: 100%; display: flex; align-items: center; justify-content: space-between;
    position: relative;
  }
  .pe-mock-hamburger {
    background: none; border: none; font-size: 22px; cursor: pointer;
    padding: 8px 10px 8px 0; margin-right: 4px; color: var(--pe-text-secondary);
    line-height: 1;
  }
  .pe-brand { display: flex; align-items: center; gap: 8px; }
  .pe-brand-name {
    font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 20px;
    color: var(--pe-accent);
  }
  .pe-clinic-center {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 15px;
    color: var(--pe-text-primary); max-width: 40vw; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .pe-dark-toggle {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--pe-border);
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .pe-dark-toggle:hover { background: var(--pe-chip-bg); }

  .pe-page-wrap { max-width: 1200px; margin: 0 auto; padding: 24px 24px 32px; }
  .pe-two-col { display: flex; gap: 28px; align-items: flex-start; min-height: calc(100vh - 56px); }
  .pe-col-left  { flex: 2; min-width: 0; overflow-y: auto; max-height: calc(100vh - 56px); padding-right: 4px; }
  .pe-col-right { flex: 1; min-width: 280px; max-width: 420px; overflow-y: auto; max-height: calc(100vh - 56px); position: sticky; top: 72px; align-self: flex-start; }

  .pe-card {
    background: var(--pe-card);
    border: 1px solid var(--pe-border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .pe-card h2 {
    font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 20px;
    color: var(--pe-text-primary); margin-bottom: 16px;
  }
  .pe-card h3 {
    font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 18px;
    color: var(--pe-text-primary); margin-bottom: 12px;
  }

  .pe-hero-row { display: flex; gap: 20px; flex-wrap: wrap; }
  .pe-avatar {
    width: 120px; height: 120px; flex-shrink: 0;
    background: var(--pe-accent); border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 36px;
    color: #fff; overflow: hidden;
  }
  .pe-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .pe-edit-icon {
    background: none; border: none;
    font-size: 16px; margin-right: 6px; color: var(--pe-accent);
    cursor: pointer; padding: 0 4px; vertical-align: middle;
  }
  .pe-hero-info { flex: 1; min-width: 200px; }
  .pe-hero-name {
    font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 24px;
    color: var(--pe-text-primary); margin-bottom: 4px; line-height: 1.25;
  }
  .pe-hero-role { color: var(--pe-accent); font-weight: 500; font-size: 15px; margin-bottom: 12px; }
  .pe-hero-pills-wrap {
    display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;
  }
  .pe-hero-pills-wrap .edit-icon { margin-top: 6px; flex-shrink: 0; }
  .pe-pills { display: flex; flex-wrap: wrap; gap: 8px; flex: 1; min-width: 0; }
  .pe-pill {
    padding: 6px 14px; background: var(--pe-chip-bg);
    color: var(--pe-text-secondary); border-radius: 999px; font-size: 13px;
  }
  .pe-bio-text { color: var(--pe-text-secondary); line-height: 1.7; font-size: 14px; }
  .pe-bio-toggle {
    background: none; border: none; cursor: pointer;
    color: var(--pe-accent); font-weight: 500; font-size: 14px;
    margin-top: 6px; padding: 0;
  }

  .pe-accolades-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .pe-accolades-grid { grid-template-columns: 1fr; } }
  .pe-accolade-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; background: var(--pe-inner-bg);
    border: 1px solid var(--pe-inner-border); border-radius: 8px;
  }
  .pe-accolade-item svg { color: var(--pe-accent); flex-shrink: 0; }

  .pe-conditions { display: flex; flex-wrap: wrap; gap: 8px; }
  .pe-cond-chip {
    padding: 6px 14px; background: var(--pe-accent-dark);
    color: #fff; border-radius: 999px; font-size: 13px;
  }
  html.pe-dark .pe-cond-chip { background: #005561; }

  .pe-tabs-bar {
    position: sticky; top: 0;
    background: var(--pe-bg); padding: 10px 0 8px; z-index: 10;
  }
  .pe-tabs-row { display: flex; gap: 8px; overflow-x: auto; flex-wrap: wrap; }
  .pe-tab-btn {
    padding: 8px 18px; border-radius: 999px; white-space: nowrap;
    cursor: pointer; font-weight: 500; font-size: 14px;
    border: 1px solid var(--pe-border);
    background: var(--pe-card); color: var(--pe-text-secondary);
  }
  .pe-tab-btn:hover { border-color: var(--pe-accent); }
  .pe-tab-btn.active { background: var(--pe-accent); color: #fff; border-color: var(--pe-accent); }

  .pe-tab-panel { display: none; padding-bottom: 24px; }
  .pe-tab-panel.active { display: block; }

  .pe-contact-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .pe-contact-row svg { color: var(--pe-accent); flex-shrink: 0; }
  .pe-contact-row a { color: var(--pe-accent); text-decoration: none; }
  .pe-contact-row a:hover { text-decoration: underline; }

  .pe-clinic-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
  .pe-clinic-row svg { color: var(--pe-accent); flex-shrink: 0; margin-top: 2px; }
  .pe-clinics-scroll-list {
    max-height: 240px;
    overflow-y: auto;
    padding: 4px 8px 12px 0;
    margin-bottom: 8px;
    -webkit-overflow-scrolling: touch;
  }
  .pe-clinic-entry {
    padding: 12px 0;
    border-bottom: 1px solid var(--pe-border, #e8e8e8);
  }
  .pe-clinic-entry:last-child { border-bottom: none; }
  .pe-clinic-entry h4 { margin: 0 0 8px; font-size: 1rem; font-weight: 600; color: var(--pe-text, #1a1a1a); }
  .pe-dark .pe-clinic-entry { border-bottom-color: #3a3a3a; }
  .pe-dark .pe-clinic-entry h4 { color: #f0f0f0; }
  .pe-timing-badge {
    padding: 4px 12px; background: var(--pe-chip-bg);
    color: var(--pe-accent-dark); border-radius: 999px; font-size: 13px;
  }
  .pe-clinics-card-title { font-size: 1.1rem; margin-bottom: 4px; }
  .pe-clinic-map-wrap {
    width: 100%; margin-top: 12px; border-radius: 8px; overflow: hidden;
    background: var(--pe-chip-bg); min-height: 140px;
  }
  .pe-map-iframe {
    width: 100%; height: 140px; border: 0; display: block; vertical-align: bottom;
  }
  .pe-clinic-map-wrap .pe-map-placeholder {
    margin-top: 0; min-height: 140px;
  }
  .pe-map-placeholder {
    width: 100%; height: 140px; background: var(--pe-chip-bg);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    color: var(--pe-text-hint); font-size: 14px; margin-top: 12px;
  }
  .pe-clinic-map-rows { display: flex; flex-direction: column; gap: 16px; }
  .pe-clinic-map-edit-row label.pe-clinic-map-label {
    display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 6px; color: var(--pe-text, #333);
  }
  .pe-dark .pe-clinic-map-edit-row label.pe-clinic-map-label { color: #e0e0e0; }
  .pe-clinic-map-url-input {
    width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--pe-inner-border, #ddd);
    font-size: 0.9rem; box-sizing: border-box;
  }
  .pe-dark .pe-clinic-map-url-input { background: #2a2a2a; border-color: #555; color: #eee; }

  .pe-rating-summary { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .pe-rating-score { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 30px; }
  .pe-stars { display: flex; gap: 4px; }
  .pe-stars svg { color: var(--pe-accent); }
  .pe-review-count { font-size: 13px; color: var(--pe-text-hint); }
  .pe-review-item {
    padding: 16px; background: var(--pe-inner-bg);
    border: 1px solid var(--pe-inner-border); border-radius: 8px; margin-bottom: 12px;
  }

  .pe-care-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 640px) { .pe-care-grid { grid-template-columns: 1fr; } }
  .pe-care-item {
    padding: 18px; background: var(--pe-inner-bg);
    border: 1px solid var(--pe-inner-border); border-radius: 12px;
  }
  .pe-care-num {
    width: 30px; height: 30px; background: var(--pe-accent); border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 14px; margin-right: 8px;
  }

  .pe-faq-item { border: 1px solid var(--pe-border); border-radius: 8px; overflow: hidden; margin-bottom: 10px; }
  .pe-faq-q {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; text-align: left; cursor: pointer;
    background: transparent; border: none; color: var(--pe-text-primary);
    font-weight: 600; font-size: 14px;
  }
  .pe-faq-q:hover { background: var(--pe-inner-bg); }
  .pe-faq-item.open .pe-faq-a { max-height: 240px; opacity: 1; padding-bottom: 14px; }
  .pe-faq-a {
    max-height: 0; overflow: hidden; opacity: 0; transition: max-height .25s ease, opacity .2s;
    padding: 0 16px; color: var(--pe-text-secondary); font-size: 14px; line-height: 1.6;
  }

  .pe-sched-card {
    background: var(--pe-card); border: 1px solid var(--pe-border);
    border-radius: 16px; padding: 22px;
  }
  .pe-sched-title { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 22px; margin-bottom: 4px; }
  .pe-sched-sub { font-size: 13px; color: var(--pe-text-hint); margin-bottom: 24px; }
  .pe-section-label { font-weight: 600; font-size: 14px; margin-bottom: 10px; display: block; }

  .pe-visit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .pe-visit-btn {
    padding: 14px; border-radius: 8px; border: 2px solid var(--pe-border);
    background: transparent; cursor: pointer; text-align: center;
  }
  .pe-visit-btn { transition: border-color .2s, background .2s; }
  .pe-visit-btn:hover { border-color: rgba(0,136,150,.3); }
  .pe-visit-btn.active { border-color: var(--pe-accent); background: rgba(0,136,150,.06); }
  html.pe-dark .pe-visit-btn.active { background: rgba(0,136,150,.1); }
  .pe-visit-btn svg { display: block; margin: 0 auto 8px; color: var(--pe-text-hint); }
  .pe-visit-btn.active svg { color: var(--pe-accent); }
  .pe-visit-btn span { font-size: 13px; font-weight: 500; color: var(--pe-text-secondary); }
  .pe-visit-btn.active span { color: var(--pe-accent); }

  .pe-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .pe-cal-month { font-weight: 600; font-size: 14px; }
  .pe-cal-nav { display: flex; gap: 6px; }
  .pe-cal-nav-btn {
    width: 30px; height: 30px; border-radius: 50%; border: none;
    background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .pe-cal-nav-btn:hover { background: var(--pe-chip-bg); }
  .pe-cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 6px; }
  .pe-cal-weekdays span { text-align: center; font-size: 11px; color: var(--pe-text-hint); }
  .pe-cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 24px; }
  .pe-cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: 8px; font-size: 13px; font-weight: 500; border: 2px solid transparent;
    background: transparent; cursor: pointer; color: var(--pe-text-primary);
    position: relative; transition: background .15s;
  }
  .pe-cal-day.empty { visibility: hidden; pointer-events: none; }
  .pe-cal-day.past { color: var(--pe-border); cursor: not-allowed; }
  .pe-cal-day:hover:not(.past):not(.empty) { background: var(--pe-chip-bg); }
  .pe-cal-day.today:not(.selected) { border-color: var(--pe-accent); color: var(--pe-accent); }
  .pe-cal-day.selected { background: var(--pe-accent); color: #fff; border-color: var(--pe-accent); }
  .pe-cal-dot {
    position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px; background: var(--pe-accent); border-radius: 50%;
  }
  .pe-cal-day.selected .pe-cal-dot,
  .pe-cal-day.today .pe-cal-dot { display: none; }
  html.pe-dark .pe-cal-day.past { color: var(--pe-chip-bg); }

  .pe-slot-section { margin-bottom: 12px; }
  .pe-slot-label { font-size: 11px; color: var(--pe-text-hint); margin-bottom: 6px; }
  .pe-slot-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .pe-slot-btn {
    padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 500;
    border: 1px solid var(--pe-border); background: var(--pe-card); cursor: pointer;
    color: var(--pe-text-secondary);
  }
  .pe-slot-btn { transition: border-color .15s, background .15s, color .15s; }
  .pe-slot-btn:hover:not(.unavail) { border-color: var(--pe-accent); }
  .pe-slot-btn.selected { background: var(--pe-accent); color: #fff; border-color: var(--pe-accent); }
  .pe-slot-btn.unavail {
    background: var(--pe-unavail-bg); color: var(--pe-unavail-text);
    cursor: not-allowed; border-color: var(--pe-border); opacity: 1;
  }

  .pe-book-btn {
    width: 100%; padding: 12px; border-radius: 8px; border: none;
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 15px;
    margin-top: 24px; margin-bottom: 16px; cursor: pointer; transition: background .2s;
  }
  .pe-book-btn.enabled { background: var(--pe-accent); color: #fff; }
  .pe-book-btn.enabled:hover { background: var(--pe-accent-dark); }
  .pe-book-btn.disabled { background: var(--pe-chip-bg); color: var(--pe-text-hint); cursor: not-allowed; }

  .pe-footer-notes { text-align: center; }
  .pe-footer-notes > p { font-size: 12px; color: var(--pe-text-hint); margin-bottom: 6px; }
  .pe-footer-lock {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 12px; color: var(--pe-text-hint);
  }
  .pe-footer-lock svg { flex-shrink: 0; color: var(--pe-text-hint); }

  .pe-ext-edit-sheet {
    display: none; margin-top: 16px; padding: 20px;
    border: 1px solid var(--pe-border); border-radius: 12px; background: var(--pe-inner-bg);
  }
  .pe-ext-edit-sheet.is-open { display: block; }
  .pe-ext-edit-sheet label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 6px; color: var(--pe-text-secondary); }
  .pe-ext-edit-sheet input, .pe-ext-edit-sheet textarea {
    width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--pe-border);
    margin-bottom: 14px; font-size: 14px; background: var(--pe-card); color: var(--pe-text-primary);
  }
  .pe-link-standard { font-size: 13px; margin-top: 12px; display: inline-block; color: var(--pe-accent); }

  h2.pe-card-title-row {
    font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 20px;
    color: var(--pe-text-primary); margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  a.edit-icon {
    background: none; border: none; font-size: 16px; color: var(--pe-accent);
    text-decoration: none; cursor: pointer; line-height: 1; padding: 2px 4px; display: inline-block;
  }
  a.edit-icon:hover { text-decoration: underline; color: var(--pe-accent-dark); }

  .pe-modal-root {
    display: none; position: fixed; inset: 0; z-index: 5000;
    align-items: center; justify-content: center; padding: 16px; box-sizing: border-box;
  }
  .pe-modal-root.is-open { display: flex; }
  .pe-modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.45); }
  .pe-modal-dialog {
    position: relative; z-index: 1; background: var(--pe-card); border: 1px solid var(--pe-border);
    border-radius: 14px; width: 100%; max-width: 520px; max-height: 90vh;
    display: flex; flex-direction: column; box-shadow: 0 16px 48px rgba(0,0,0,0.15);
  }
  .pe-modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px; border-bottom: 1px solid var(--pe-border); flex-shrink: 0;
  }
  .pe-modal-header h3 {
    margin: 0; font-family: 'Manrope', sans-serif; font-size: 18px; font-weight: 700;
    color: var(--pe-text-primary);
  }
  .pe-modal-close {
    background: none; border: none; font-size: 22px; line-height: 1; cursor: pointer;
    color: var(--pe-text-hint); padding: 0 4px;
  }
  .pe-modal-close:hover { color: var(--pe-text-primary); }
  .pe-modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; min-height: 0; }
  .pe-modal-footer {
    padding: 14px 20px 18px; display: flex; justify-content: flex-end; gap: 10px;
    border-top: 1px solid var(--pe-border); flex-shrink: 0;
  }
  .pe-modal-hint { font-size: 13px; color: var(--pe-text-secondary); margin: 0 0 12px; line-height: 1.45; }
  .pe-modal-add-row {
    margin-bottom: 14px; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--pe-accent);
    background: transparent; color: var(--pe-accent); font-weight: 600; cursor: pointer; font-size: 14px;
  }
  .pe-modal-add-row:hover { background: rgba(0,136,150,0.08); }
  .pe-dynamic-rows { display: flex; flex-direction: column; gap: 10px; }
  .pe-dyn-row { display: flex; gap: 8px; align-items: flex-start; flex-wrap: wrap; }
  .pe-dyn-row input, .pe-dyn-row textarea {
    flex: 1; min-width: 0; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--pe-border);
    font-size: 14px; background: var(--pe-card); color: var(--pe-text-primary); font-family: inherit;
  }
  .pe-dyn-row textarea { min-height: 72px; resize: vertical; }
  .pe-care-rows .pe-care-title { flex: 1 1 140px; }
  .pe-care-rows .pe-care-body { flex: 2 1 200px; }
  .pe-dyn-row-del {
    flex-shrink: 0; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--pe-border);
    background: var(--pe-inner-bg); cursor: pointer; color: var(--pe-text-secondary); font-size: 13px;
  }
  .pe-dyn-row-del:hover { border-color: #c0392b; color: #c0392b; }
  .pe-modal-btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; font-family: inherit; }
  .pe-modal-btn-secondary { background: var(--pe-chip-bg); color: var(--pe-text-secondary); }
  .pe-modal-btn-primary { background: var(--pe-accent); color: #fff; }
  .pe-modal-btn-primary:hover { background: var(--pe-accent-dark); }

  body.profile-ext-page .select2-container { width: 100% !important; max-width: 100%; }
  .select2-container--default .select2-selection--multiple {
    min-height: 46px; border-color: var(--pe-border) !important; background: var(--pe-card) !important;
    border-radius: 8px !important;
  }
  .select2-container--default.select2-container--focus .select2-selection--multiple {
    border-color: var(--pe-accent) !important;
  }
  .select2-container--default .select2-selection--multiple .select2-selection__choice {
    background: var(--pe-chip-bg) !important; border-color: var(--pe-border) !important;
