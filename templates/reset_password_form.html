{% extends "base.html" %}
{% block title %}Set New Password – PsycheLife{% endblock %}
{% block extra_css %}
<style>
    .container-narrow { max-width: 440px; margin: 40px auto; padding: 0 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; }
    .form-control { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
    .form-control:focus { border-color: var(--primary-dark); outline: none; }
    .btn-block { width: 100%; margin-top: 8px; }
    .back-link { display: inline-block; margin-top: 16px; color: var(--primary-dark); text-decoration: none; font-size: 0.95rem; }
    .back-link:hover { text-decoration: underline; }
</style>
{% endblock %}
{% block content %}
<div class="container-narrow">
    <h2>Set New Password</h2>
    <p style="margin: 12px 0 20px; color: #555;">Enter your new password below.</p>
    <form method="POST" action="{{ url_for('reset_password_with_token', token=token) }}">
        <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" class="form-control" id="password" name="password" required minlength="1" placeholder="New password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Update Password</button>
    </form>
    <a href="{{ url_for('landing') }}" class="back-link">← Back to login</a>
</div>
{% endblock %}
