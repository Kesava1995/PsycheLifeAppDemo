{% extends "base.html" %}
{% block title %}Forgot Password – PsycheLife{% endblock %}
{% block extra_css %}
<style>
    .container-narrow { max-width: 440px; margin: 40px auto; padding: 0 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; }
    .form-control { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
    .form-control:focus { border-color: var(--primary-dark); outline: none; }
    .btn-block { width: 100%; margin-top: 8px; }
    .back-link { display: inline-block; margin-top: 16px; color: var(--primary-dark); text-decoration: none; font-size: 0.95rem; }
    .back-link:hover { text-decoration: underline; }
</style>
{% endblock %}
{% block content %}
<div class="container-narrow">
    <h2>Forgot Password</h2>
    <p style="margin: 12px 0 20px; color: #555;">Enter your email address and we'll send you a link to reset your password.</p>
    <form method="POST" action="{{ url_for('forgot_password') }}">
        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" class="form-control" id="email" name="email" required placeholder="your@email.com">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
    </form>
    <a href="{{ url_for('landing') }}" class="back-link">← Back to login</a>
</div>
{% endblock %}
